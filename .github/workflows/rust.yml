name: Rust Deploy
on:
  push:
  pull_request:
permissions:
  contents: write
jobs:
  build-and-upload:
    name: Windows Build
    runs-on: windows-latest
    env:
      BINARY_NAME: gui_basketball
      TARGET: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set version
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '/', '-'
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}
      - name: Build release executable
        run: cargo build --release --target ${{ env.TARGET }}
      - name: Package executable
        shell: pwsh
        run: |
          $exe = "target/${env:TARGET}/release/${env:BINARY_NAME}.exe"
          if (-not (Test-Path $exe)) {
            throw "No file found: $exe"
          }

          $dirname = "${env:BINARY_NAME}-${env:VERSION}-${env:TARGET}"
          New-Item -ItemType Directory -Force -Path $dirname | Out-Null
          Copy-Item $exe -Destination "$dirname/"

          $zip = "$dirname.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path $dirname -DestinationPath $zip

          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ env.VERSION }}-windows
          path: ${{ env.ASSET }}
          if-no-files-found: error
          retention-days: 14
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
