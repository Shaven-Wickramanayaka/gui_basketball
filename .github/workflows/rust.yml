name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
jobs:
# Jobs based on textpod deploy instructions
  linux_windows:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v2
    - name: Install Linux and Windows Cross Compilers
      run: sudo apt-get install --yes --no-install-recommends musl-tools gcc-mingw-w64-x86-64-win32
    - name: Install rustup targets
      run: rustup target add x86_64-unknown-linux-musl x86_64-pc-windows-gnu
    - name: Build the executable
      run: cargo build --release --target x86_64-unknown-linux-musl --target x86_64-pc-windows-gnu
    - name: Tar x86_64 binary
      run: tar -czvf gui_basketball-gnu-linux-x86_64.tar.gz -C target/x86_64-unknown-linux-musl/release gui_basketball
    - name: Zip windows binary
      run: zip -j gui_basketball-windows.zip target/x86_64-pc-windows-gnu/release/textpod.exe
    - name: Generate SHA256 checksums
      run: |
        shasum -a 256 gui_basketball-gnu-linux-x86_64.tar.gz > gui_basketball-gnu-linux-x86_64.tar.gz.sha256
        shasum -a 256 gui_basketball-windows.zip > gui_basketball-windows.zip.sha256
    - name: Upload release binaries
      uses: alexellis/upload-assets@0.4.0
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        asset_paths: '["gui_basketball-gnu-linux-x86_64.tar.gz", "gui_basketball-windows.zip", "gui_basketball-gnu-linux-x86_64.tar.gz.sha256", "gui_basketball-windows.zip.sha256"]'
