name: Rust Deploy

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build for Windows
    runs-on: windows-latest
    env:
      BINARY_NAME: gui_basketball
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Get release version
        shell: bash
        run: |
          VERSION_SAFE="${GITHUB_REF_NAME//\//-}"
          echo "VERSION=${VERSION_SAFE}" >> "$GITHUB_ENV"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Build archive
        shell: bash
        run: |
          dirname="${BINARY_NAME}-${VERSION}-x86_64-pc-windows-msvc"
          mkdir -p "$dirname"
          mv "target/x86_64-pc-windows-msvc/release/${BINARY_NAME}.exe" "$dirname/"
          7z a "${dirname}.zip" "$dirname"
          echo "ASSET=${dirname}.zip" >> "$GITHUB_ENV"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
          if-no-files-found: error
          retention-days: 14
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
